version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5433:5432"]
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  db-data:
services:

  postgres:
    image: postgres:16
    container_name: hms_postgres
    restart: always
    environment:
      POSTGRES_DB: hms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hms_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: hms_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hms
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery:
    build: ./backend
    container_name: hms_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=postgres
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hms
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  celery-beat:
    build: ./backend
    container_name: hms_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=postgres
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/hms
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build: ./frontend
    container_name: hms_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

volumes:
  postgres_data:

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name ${NGINX_MAIN_DOMAIN} *.${NGINX_MAIN_DOMAIN} ${NGINX_BACKEND_DOMAIN};

    if ($host = "www.${NGINX_MAIN_DOMAIN}") {
        return 301 https://${NGINX_MAIN_DOMAIN}$request_uri;
    }

    if ($host ~* "^www\.(.+)\.${NGINX_MAIN_DOMAIN}$") {
        return 301 https://$1.${NGINX_MAIN_DOMAIN}$request_uri;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ${NGINX_MAIN_DOMAIN} *.${NGINX_MAIN_DOMAIN};
    client_max_body_size 25m;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    if ($host = "www.${NGINX_MAIN_DOMAIN}") {
        return 301 https://${NGINX_MAIN_DOMAIN}$request_uri;
    }

    if ($host ~* "^www\.(.+)\.${NGINX_MAIN_DOMAIN}$") {
        return 301 https://$1.${NGINX_MAIN_DOMAIN}$request_uri;
    }

    location = /__subsite_check {
        internal;
        proxy_pass http://backend:8000/api/subsite-availability/;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_intercept_errors on;
        error_page 404 =403 /__subsite_forbidden;
    }

    location = /__subsite_forbidden {
        internal;
        return 403;
    }

    error_page 401 403 404 = @site_unavailable;

    location @site_unavailable {
        default_type text/plain;
        return 404 "Site is not available";
    }

    location / {
        auth_request /__subsite_check;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 443 ssl http2;
    server_name ${NGINX_BACKEND_DOMAIN};
    client_max_body_size 25m;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location /static/ {
        alias /var/www/backend_static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

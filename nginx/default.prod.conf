map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name ${NGINX_MAIN_DOMAIN} *.${NGINX_MAIN_DOMAIN};
    client_max_body_size 25m;

    location = /__subsite_check {
        internal;
        proxy_pass http://backend:8000/api/subsite-availability/;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 =403 /__subsite_forbidden;
    }

    location = /__subsite_forbidden {
        internal;
        return 403;
    }

    error_page 401 403 404 = @site_unavailable;

    location @site_unavailable {
        default_type text/plain;
        return 404 "Site is not available";
    }

    location / {
        auth_request /__subsite_check;
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name ${NGINX_BACKEND_DOMAIN};
    client_max_body_size 25m;

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
